# cargo-deny configuration — supply-chain policy enforced in CI.
#
# Run locally with: cargo deny check all --all-features
# CI: .github/workflows/deny.yml (EmbarkStudios/cargo-deny-action, `check all --all-features`).

[graph]
# Mirror CI, which passes --all-features.
all-features = true

# ── Security advisories ──────────────────────────────────────────────────────
[advisories]
version = 2
# Vulnerabilities fail the build by default; yanked and unmaintained advisories are
# made strict too (fail anywhere in the tree, including transitive). Accepted
# exceptions — each an unactionable transitive advisory backed by an ADR: either
# unmaintained-informational, or a vulnerability proven NON-REACHABLE in our usage
# and un-bumpable in the current dependency tree — are listed in `ignore`.
yanked = "deny"
unmaintained = "all"
ignore = [
    # `paste` — unmaintained (archived upstream), informational (no CVE). A
    # transitive proc-macro pulled only on the macOS Apple path
    # (metal → wgpu → iced); we have no direct use and no reachable replacement.
    # Accepted in docs/adr/0010-accept-transitive-paste-advisory.md.
    "RUSTSEC-2024-0436",
    # `ttf-parser` — unmaintained, informational (no CVE; the advisory states "no
    # safe upgrade is available"). A transitive font parser with no direct use and no
    # reachable replacement, pulled on three GUI paths: text shaping (iced/cosmic-text),
    # chart glyphs (plotters/ab_glyph), window decorations (winit/sctk-adwaita).
    # Accepted in docs/adr/0011-accept-transitive-ttf-parser-advisory.md.
    "RUSTSEC-2026-0192",
    # `quick-xml` 0.39 — two DoS *vulnerabilities*: RUSTSEC-2026-0194 (quadratic
    # attribute-name duplicate check) and RUSTSEC-2026-0195 (unbounded namespace-
    # declaration allocation). Both require parsing UNTRUSTED XML. NOT reachable here:
    # quick-xml is pulled only by `wayland-scanner`, a BUILD-TIME proc-macro that parses
    # the trusted, developer-controlled Wayland protocol `.xml` files to generate bindings
    # at compile time — never runtime or attacker-supplied input. Un-bumpable within
    # iced 0.14: `wayland-scanner 0.31.10` pins `quick-xml ^0.39`, so the `>= 0.41.0`
    # remediation needs a full winit/iced stack upgrade. Accepted in
    # docs/adr/0012-accept-transitive-quick-xml-advisories.md; revisit on the iced upgrade.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

# ── Licenses ─────────────────────────────────────────────────────────────────
# Allow only permissive licenses, compatible with this project's MIT OR Apache-2.0.
# Crates offering a choice (e.g. "X OR Apache-2.0") pass via an allowed operand,
# so weak-copyleft operands that appear only inside OR expressions need not be
# listed. No bare GPL/LGPL/AGPL crate is present.
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
]

# ── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Duplicate versions are common in a large GUI tree (wgpu/winit) and are not a
# supply-chain risk on their own — surface them as warnings, don't fail.
multiple-versions = "warn"
# Forbid wildcard ("*") version requirements on external crates, but allow them
# for internal workspace path deps (springmaker → springcore).
wildcards = "deny"
allow-wildcard-paths = true

# `quick-xml` carries two DoS advisories accepted as NON-REACHABLE in ADR 0012
# (RUSTSEC-2026-0194/0195) — reachable only when parsing untrusted XML, which we
# never do. That acceptance is contingent on quick-xml staying a BUILD-TIME
# dependency of the `wayland-scanner` proc-macro (which parses trusted Wayland
# protocol XML at compile time). Enforce that precondition mechanically rather than
# by comment alone: quick-xml is allowed ONLY when pulled by `wayland-scanner`. Any
# NEW direct or otherwise-wrapped quick-xml dependency trips this ban, forcing a
# conscious re-evaluation of the advisory acceptance instead of a silent ID-keyed pass.
[[bans.deny]]
name = "quick-xml"
wrappers = ["wayland-scanner"]

# ── Sources ──────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
