version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps):"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci):"
    labels:
      - dependencies
      - ci
    groups:
      # The codeql-action sub-actions (init/analyze/upload-sarif) hard-fail on
      # mixed versions ("Loaded a configuration file for version X, but running
      # version Y"), so their bumps must travel in one PR.
      codeql-action:
        patterns:
          - github/codeql-action/*
