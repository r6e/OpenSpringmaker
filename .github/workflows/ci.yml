name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cargo_workspace: ${{ steps.workspace.outputs.exists }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'springcore/**'
              - 'springmaker/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'clippy.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cargo_workspace == 'true' && needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build docs (-D warnings)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.cargo_workspace == 'true' && needs.changes.outputs.code == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
      - run: cargo test --workspace --all-features

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.cargo_workspace == 'true' && needs.changes.outputs.code == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
      - run: cargo build --workspace --release

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cargo_workspace == 'true' && needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.85"
      - run: cargo check --workspace --all-features

  nightly:
    name: Nightly toolchain (informational)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cargo_workspace == 'true' && needs.changes.outputs.code == 'true'
    timeout-minutes: 20
    continue-on-error: true
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - run: cargo check --workspace --all-features
