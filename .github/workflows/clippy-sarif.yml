name: Clippy SARIF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/setup-rust
        if: steps.workspace.outputs.exists == 'true'
        with:
          components: clippy
      - name: Install SARIF tools
        if: steps.workspace.outputs.exists == 'true'
        run: cargo install --locked --version 0.8.0 clippy-sarif && cargo install --locked --version 0.8.0 sarif-fmt
      - name: Run Clippy with SARIF output
        if: steps.workspace.outputs.exists == 'true'
        run: >
          cargo clippy --workspace --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF to GitHub
        if: steps.workspace.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          wait-for-processing: true
