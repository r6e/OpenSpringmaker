name: Clippy SARIF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/setup-rust
        if: steps.workspace.outputs.exists == 'true'
        with:
          components: clippy
      - name: Install SARIF tools
        if: steps.workspace.outputs.exists == 'true'
        run: cargo install --locked --version 0.8.0 clippy-sarif && cargo install --locked --version 0.8.0 sarif-fmt
      - name: Run Clippy with SARIF output
        if: steps.workspace.outputs.exists == 'true'
        run: >
          cargo clippy --workspace --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true
      - name: Upload SARIF to GitHub
        if: steps.workspace.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
          wait-for-processing: true
