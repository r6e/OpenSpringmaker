name: Feature request
description: Propose a new spring-design capability, solver scenario, material, GUI workflow, or developer-tooling enhancement.
title: "feat: <one-line summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What spring-design workflow, calculation, or contributor task is blocked today?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core solver library (springcore)
        - Desktop calculator GUI (springmaker)
        - Materials data
        - Design save/load
        - Documentation
        - Build / CI / tooling
        - Other

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should OpenSpringmaker do? Mention the solver scenario, library API, GUI element, material record, or workflow you expect.

  - type: textarea
    id: references
    attributes:
      label: Engineering references
      description: List standards, textbooks, tables, equations, or worked examples that support the request, when applicable.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferred.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: This request does not rely on naming or copying behavior from a commercial product.
          required: true
