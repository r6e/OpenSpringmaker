# Mutation-equivalent exclusions for springcore/src/optimize.rs.
#
# Each entry is justified below. Only mutants proven equivalent by formal
# argument are excluded — all others must be killed by tests.

exclude_re = [
  # Line 77: `if stress_at(dm_lo) - allowable > 0.0 { return None; }`
  #
  # Mutant "> → ==":
  #   Differs from the original ONLY when stress_at(dm_lo) - allowable == 0.0 exactly.
  #   find_root_bracketed checks `if fa == 0.0 { return Ok(a) }` before its sign check,
  #   so the two branches resolve the exact-equality input differently:
  #     Original (>):  0.0 > 0.0  = false → falls through → find_root sees fa == 0.0 →
  #                    Ok(dm_lo) → design at exact allowable is accepted.
  #     Mutant   (==): 0.0 == 0.0 = true  → returns None (rejected).
  #   For any strictly-positive residual the two are identical (both reach the
  #   same-sign Err(InvalidBracket) → .ok()? → None path), so exact equality is the
  #   only distinguishing input. That is the same IEEE 754 cancellation as the ">="
  #   entry below — not realistically achievable, so no killable test exists.
  #
  # Mutant "> → >=":
  #   Only differs when stress_at(dm_lo) - allowable == 0.0 exactly.
  #   Original: 0.0 > 0.0 = false → continues (design at exact allowable is accepted).
  #   Mutant:   0.0 >= 0.0 = true → returns None (rejected).
  #   Achieving exact IEEE 754 cancellation between two independent computation
  #   paths (Wahl-corrected torsion and the power-law MTS) is not realistically
  #   achievable with the available material constants, so no killable test exists.
  "optimize\\.rs:77:.*replace > with ==",
  "optimize\\.rs:77:.*replace > with >=",

  # Line 148: `if best.as_ref().map(|b| mass < b.mass_kg).unwrap_or(true)`
  #
  # Mutant "< → <=":
  #   Only differs when two candidates produce exactly equal mass_kg.
  #   Original: equal mass → false → keeps the previously recorded best.
  #   Mutant:   equal mass → true → replaces best with the new candidate.
  #   Because wire_mass = rho*(pi^2/4)*d^2*dm*Nt and active coils na = G*d^4/(8*dm^3*rate)
  #   are both continuous functions of distinct wire diameters, two different
  #   candidates producing identical mass_kg in IEEE 754 would require a manufactured
  #   coincidence. The tie itself is unreachable — no input can produce two candidates
  #   with bit-identical mass_kg — so no distinguishing test can exist.
  "optimize\\.rs:148:.*replace < with <=",

  # ---------------------------------------------------------------------------
  # Mutation-equivalent exclusions for springcore/src/extension/optimize.rs.
  #
  # The extension minimum-weight optimizer mirrors the compression optimizer
  # above. The same two equivalence classes recur, with three differences from
  # the compression case noted per entry: different line numbers, a richer mass
  # formula (the hook-wire term), and a per-stress binding search (three stress
  # closures, not one).
  #
  # Line 185: inside the per-stress `bound_for` helper,
  #   `if stress(dm_lo) - allowable > 0.0 { return None; }`
  # bound_for runs once per stress (body shear, hook bending, hook torsion), so
  # the argument below is local to whichever stress closure is bound.
  #
  # Mutant "> → ==":
  #   Differs from the original ONLY when stress(dm_lo) - allowable == 0.0 exactly.
  #   find_root_bracketed checks `if fa == 0.0 { return Ok(a) }` before its sign check:
  #     Original (>):  0.0 > 0.0  = false → falls through → find_root sees fa == 0.0 →
  #                    Ok(dm_lo) → Some((dm_lo, label)) (design at exact allowable accepted).
  #     Mutant   (==): 0.0 == 0.0 = true  → returns None → best_mean_dia returns None
  #                    via the `?` on the candidate (rejected).
  #   For any strictly-positive residual the two are identical: both reach
  #   find_root_bracketed with f(dm_lo) > 0 and f(dm_hi) > 0 (every stress is monotone
  #   increasing in D, so no sign change) → Err(InvalidBracket) → `.ok()?` → None. So
  #   exact equality is the only distinguishing input — the same IEEE 754 cancellation
  #   as the ">=" entry below, not realistically achievable, so no killable test exists.
  #
  # Mutant "> → >=":
  #   Only differs when stress(dm_lo) - allowable == 0.0 exactly.
  #   Original: 0.0 > 0.0 = false → continues (design at exact allowable accepted).
  #   Mutant:   0.0 >= 0.0 = true → returns None (rejected).
  #   Exact IEEE 754 cancellation between two independent computation paths
  #   (a Wahl/Bergsträsser-corrected or hook-curvature-corrected stress and the
  #   power-law allowable derived from MTS) is not realistically achievable with
  #   the available material constants, so no killable test exists.
  "extension/optimize\\.rs:185:.*replace > with ==",
  "extension/optimize\\.rs:185:.*replace > with >=",

  # Line 347: `if best.as_ref().map(|b| mass < b.mass_kg).unwrap_or(true)`
  #
  # Mutant "< → <=":
  #   Only differs when two candidates produce exactly equal mass_kg.
  #   Original: equal mass → false → keeps the previously recorded best.
  #   Mutant:   equal mass → true → replaces best with the new candidate.
  #   Extension wire mass = rho*(pi/4)*d^2 * (pi*dm*na + 2*pi*d_loop), with active
  #   coils na = G*d^4/(8*dm^3*rate). These are continuous functions of distinct
  #   wire diameters, so two *different* candidates producing bit-identical mass_kg
  #   would require a manufactured coincidence across even more terms than the
  #   compression case (the hook-wire term is added). And a *duplicate* diameter in
  #   candidate_diameters (e.g. [3.0, 3.0]) yields a bit-identical design and mass,
  #   so `<` and `<=` return indistinguishable output there too. The tie is either
  #   unreachable or output-indistinguishable — no distinguishing test can exist.
  "extension/optimize\\.rs:347:.*replace < with <=",

  # ---------------------------------------------------------------------------
  # Mutation-equivalent exclusions for springcore/src/torsion/optimize.rs.
  #
  # Line 307: `if best.as_ref().is_none_or(|b| mass_kg < b.mass_kg)`
  #
  # Mutant "< → <=":
  #   Only differs when two candidates produce exactly equal mass_kg.
  #   Original: equal mass → false → keeps the previously recorded best.
  #   Mutant:   equal mass → true → replaces best with the new candidate.
  #   Torsion wire mass = rho*(pi/4)*d^2 * (pi*D*N_b + L1 + L2) with N_b from
  #   the rate inversion — a strictly increasing function of d for a fixed request,
  #   so distinct candidates cannot tie in mass. A *duplicate* candidate diameter
  #   (e.g. [2.0, 2.0]) yields a bit-identical design and mass, making `<` vs `<=`
  #   output-indistinguishable. The tie is either unreachable or
  #   output-indistinguishable — no distinguishing test can exist.
  "torsion/optimize\\.rs:307:.*replace < with <=",

  # material_persist.rs:40 — default_schema_version -> CURRENT_SCHEMA_VERSION (=1).
  # Mutants returning 0 or 1 are equivalent: any value <= CURRENT_SCHEMA_VERSION (1)
  # produces identical no-warning behavior in parse_user_overlay. Equivalent.
  "material_persist\\.rs:40:.*",

  # MaterialStore::save() body replaced with Ok(()). Exercising save() requires
  # writing to the real OS user config file (non-hermetic). The hermetic core
  # (save_to_path, serialize_user_materials, atomic_write) is unit-tested. Matched
  # by mutant signature (not line number) so edits above save() don't un-anchor it;
  # the `save -> ` (space) cannot match `save_to_path -> `.
  "replace MaterialStore::save -> Result.*with Ok",

  # material_store.rs — mutants that cargo-mutants can only record as timeouts because
  # MaterialStore::unique_copy_name's search loop is unbounded: it appends "(copy)",
  # "(copy 2)", ... until name_exists() is false (name_exists is called ONLY here, at
  # lines 121/127).
  #
  #   :49 name_exists -> true   } These three make the loop's exit condition
  #   :127 delete `!`           } permanently unsatisfiable, so the clone tests hang.
  #   :130 `+=` -> `*=`         } name_exists has no caller outside the loop, so they
  #                               are PURE non-termination — caught-by-hang, not
  #                               survivors. (:130 freezes n=2; :127 returns only on a
  #                               taken name, and fresh candidates are never taken.)
  #
  #   :44 is_curated -> true    is DIFFERENT and excluded for an honest, narrower
  #                             reason: is_curated is ALSO called from add /
  #                             check_name_available / update / remove, so this mutant
  #                             is independently KILLABLE — add_user_material,
  #                             update_user_material, and remove_user_only each open with
  #                             `s.add(...).unwrap()`, which panics under it. It is
  #                             provably caught, NOT a survivor. It lands in the timeout bucket
  #                             only because it ALSO forces name_exists() always-true,
  #                             hanging the clone tests in the same process so
  #                             cargo-mutants reports a process timeout instead of the
  #                             assertion failure. Excluded with the others purely for a
  #                             deterministic gate (which mutant trips the auto-timeout
  #                             first is runner-timing-sensitive).
  #
  # All other mutants on these lines (is_curated/name_exists -> false, `+=` -> `-=`,
  # the line-121 guard, ...) remain in scope and are killed.
  "material_store\\.rs:44:.*with true",
  "material_store\\.rs:49:.*with true",
  "material_store\\.rs:127:.*delete !",
  "material_store\\.rs:130:.*replace \\+= with \\*=",
]
