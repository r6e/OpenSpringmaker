# Curated spring-wire materials. Strength coefficients are in native units
# (MPa·mm^m) per Shigley Table 10-4 and are evaluated in those units.
# Sources: Shigley's Mechanical Engineering Design (10th ed.) Tables 10-4, 10-5,
# §10-9 (Zimmerli endurance); SMI Handbook of Spring Design (design stresses).
#
# KNOWN SIMPLIFICATION (see ADR 0006): allowable_pct_torsion / _end_torsion / _bending
# / _set are single scalars. Real SMI design stresses are diameter- and set-dependent
# curves. These scalars gate the status warnings and the Min Weight feasibility boundary;
# diameter-dependent design-stress curves are a later sub-project.
# allowable_pct_end_torsion is the end-hook torsion limit (τ_B), 40% of MTS per Shigley
# Table 10-7 / Example 10-6 — distinct from the 45% body-shear allowable_pct_torsion.

[[material]]
name = "Music Wire"
specification = "ASTM A228"
citations = "Shigley Table 10-4 (A=2211 MPa*mm^m, m=0.145); Table 10-5 (E, G); Zimmerli via Shigley 10-9; SMI design stresses"
mts_form = "power_law"
mts_units = "si_mpa_mm"
mts_coefficients = [2211.0, 0.145]
valid_dia_min_mm = 0.10
valid_dia_max_mm = 6.5
youngs_modulus_gpa = 203.4
shear_modulus_gpa = 80.0
density_kg_per_m3 = 7850.0
allowable_pct_torsion = 0.45
allowable_pct_end_torsion = 0.40
allowable_pct_bending = 0.75
allowable_pct_set = 0.60
[material.endurance]
ssa_mpa = 241.0
ssm_mpa = 379.0
peened = false

