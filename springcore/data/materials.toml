# ── Sub-project 2, PR (b): materials transcribed from Machinery's Handbook 32nd ──
# Strength models are least-squares fits to MH p390 "Minimum Tensile Strength of
# Spring Wire by Diameter"; E/G from MH Table 20; design stress (torsion) from
# optimumspring, cross-checked vs MH Fig 1-10. bending/set are conservative
# placeholders = torsion (ADR 0006; MH gives diameter-dependent curves, not %).
# See docs/superpowers/research/2026-06-21-pr-b-materials-data.md for full sourcing.

[[material]]
name = "Hard-Drawn MB"
specification = "ASTM A227"
citations = "MH 32nd Table 20 (E,G); p390 tensile-by-diameter, power-law LSQ fit A=1767.9 MPa*mm^m m=0.184 (max resid 2.9%); torsion 40% (optimumspring, cross-checked MH Fig 1); bending/set conservative placeholder (ADR 0006); max temp 250F (MH p299). Cross-check: MH steel tensiles within ASTM A227 class ranges."
mts_form = "power_law"
mts_units = "si_mpa_mm"
mts_coefficients = [1767.9, 0.184]
valid_dia_min_mm = 0.51
valid_dia_max_mm = 12.70
youngs_modulus_gpa = 197.2
shear_modulus_gpa = 79.3
density_kg_per_m3 = 7861.1
allowable_pct_torsion = 0.40
allowable_pct_end_torsion = 0.40
allowable_pct_bending = 0.40
allowable_pct_set = 0.40
max_service_temp_c = 121.1

